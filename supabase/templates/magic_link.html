<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body style="margin:0;padding:0;background:#f0f4f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;background:white;border-radius:16px;padding:40px 36px;box-shadow:0 2px 16px rgba(0,0,0,0.08);">
          <tr>
            <td align="center" style="padding-bottom:12px;font-size:2.5rem;line-height:1;">🐦</td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:8px;">
              <span style="font-size:1.5rem;font-weight:800;color:#2d3748;">Phonics</span>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <p style="margin:0;font-size:1rem;color:#718096;line-height:1.5;">
                Click the button below to sign in. This link expires in 1 hour.
              </p>
            </td>
          </tr>
          <tr>
            <td align="center" style="padding-bottom:28px;">
              <a href="{{ .ConfirmationURL }}"
                 style="display:inline-block;padding:14px 36px;background:#4299e1;color:white;text-decoration:none;border-radius:12px;font-size:1rem;font-weight:700;">
                Sign in to Phonics
              </a>
            </td>
          </tr>
          <tr>
            <td align="center">
              <p style="margin:0;font-size:0.8rem;color:#a0aec0;line-height:1.5;">
                If you didn't request this, you can safely ignore this email.
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sight Words - Learn to Read</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="sw-wrapper">
    <div class="sw-activity">
    <div class="sw-word-display" id="wordDisplay">-</div>

    <div class="sw-listening" id="listeningIndicator">
      <div class="sw-mic-pulse"></div>
      <span>Listening…</span>
    </div>

    <div class="sw-status" id="statusDisplay">Loading...</div>

  </div>

    <button class="sw-skip-btn" id="skipBtn">Skip</button>
  </div>

  <script src="app.js"></script>
</body>
</html>
